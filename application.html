<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Beans</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
/* KEEP YOUR ORIGINAL CSS HERE (unchanged) */
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="trainees.html">Trainees</a></li>
<li><a href="jobs.html">Jobs</a></li>
<li><a href="courses.html">Courses</a></li>
<li><a href="application.html">Application</a></li>
<li><a href="contactus.html">Contact Us</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="ad home-ad">
<div class="ad-content">
<h1>Apply to Hot Beans</h1>
<p>Join Hot Beans and kickstart your career</p>
<a href="#" class="btn">Apply Now</a>
</div>
</section>

<!-- APPLICATION FORM -->
<section>
<div class="container">

<div class="application-ad ad">
<div class="ad-content">
<h1>Apply to Hot Beans</h1>
<p>Fill out the form below</p>
</div>
</div>

<div class="form-container">

<form id="applicationForm" action="https://formspree.io/f/xnjgekqq" method="POST">

<div class="form-group">
<label>First Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" name="surname" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" name="phone" required>
</div>

<div class="form-group">
<label>Position</label>
<select name="jobs" required>
<option value="">Select</option>
<option>Frontend</option>
<option>Backend</option>
<option>Full Stack</option>
<option>UI/UX</option>
</select>
</div>

<div class="form-group">
<label>Experience</label>
<textarea name="experience"></textarea>
</div>

<div class="form-group">
<label>Skills</label>
<textarea name="skills"></textarea>
</div>

<div class="form-group">
<label>Portfolio</label>
<input type="url" name="portfolio">
</div>

<div class="form-group">
<label>Years</label>
<input type="number" name="years">
</div>

<button type="submit" class="btn">Submit</button>

</form>
</div>
</div>
</section>

<!-- CHATBOT -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chatbot">
<div class="chat-header">Site Assistant</div>

<div class="chat-body" id="chatBody">
<div class="bot-message">Hello! Ask me where to go.</div>
</div>

<div class="chat-footer">
<input type="text" id="userInput">
<button onclick="sendMessage()">Send</button>
<button onclick="clearChat()">Clear</button>
</div>
</div>

<!-- FOOTER -->
<footer>
<div class="container">
<p>&copy; 2025 Hot Beans</p>
</div>
</footer>

<!-- SCRIPT -->
<script>
function sendMessage() {
let input = document.getElementById("userInput");
let chat = document.getElementById("chatBody");
let message = input.value.toLowerCase();

chat.innerHTML += "<div class='user-message'>" + message + "</div>";

let reply = "Sorry, I didn't understand.";

if (message.includes("home")) {
reply = 'Go to <a href="index.html">Home</a>';
}

chat.innerHTML += "<div class='bot-message'>" + reply + "</div>";

input.value = "";
}

function toggleChat() {
const chat = document.querySelector(".chatbot");
chat.style.display = chat.style.display === "block" ? "none" : "block";
}

function clearChat() {
document.getElementById("chatBody").innerHTML =
"<div class='bot-message'>Chat cleared</div>";
}
</script>

</body>
</html>
