<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Beans - Apply</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
:root {
    --primary: #ac55c2;
    --secondary: #C6426E;
    --dark: #292929;
    --light: #f5f5f5;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: var(--light);
}


nav {
    display: flex;
    justify-content: center;
    background: #ffae00d3;
}

nav ul {
    display: flex;
    list-style: none;
}

nav a {
    padding: 15px 25px;
    color: white;
    text-decoration: none;
    font-weight: 600;
}

nav a:hover {
    background: var(--primary);
}


.ad {
    height: 300px;
    background: url('Banner1.png') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}


.container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

.form-container {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.btn {
    background: var(--primary);
    color: white;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    border-radius: 25px;
}


.chatbot {
    display: none;
    position: fixed;
    bottom: 70px;
    right: 20px;
    width: 280px;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.chat-header {
    background: #333;
    color: white;
    padding: 10px;
}

.chat-body {
    height: 200px;
    overflow-y: auto;
    padding: 10px;
}

.bot-message {
    background: #eee;
    padding: 5px;
    margin: 5px 0;
}

.user-message {
    background: #333;
    color: white;
    padding: 5px;
    margin: 5px 0;
    text-align: right;
}

.chat-footer {
    display: flex;
}

.chat-footer input {
    flex: 1;
    padding: 5px;
}

.chat-footer button {
    padding: 5px;
    background: #333;
    color: white;
    border: none;
}

.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 50%;
}

footer {
    background: #292929;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>


<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="trainees.html">Trainees</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="application.html">Application</a></li>
        <li><a href="contactus.html">Contact</a></li>
    </ul>
</nav>


<section class="ad">
    <h1>Apply to Hot Beans</h1>
</section>


<div class="container">
    <div class="form-container">
        <form action="https://formspree.io/f/xnjgekqq" method="POST">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="name" required>
            </div>

<div class="form-group">
    <label>Last Name</label>
        <input type="text" name="surname" required>
    </div>

<div class="form-group">
    <label>Email</label>
    <input type="email" name="email" required>
</div>

<div class="form-group">
    <label>Phone</label>
    <input type="tel" name="phone" required>
</div>

<div class="form-group">
    <label>Position</label>
        <select name="job" required>
            <option value="">Select</option>
            <option>Frontend</option>
            <option>Backend</option>
            <option>Full Stack</option>
            <option>UI/UX</option>
        </select>
</div>

<div class="form-group">
    <label>Experience</label>
    <textarea name="experience"></textarea>
</div>

<div class="form-group">
    <label>Skills</label>
    <textarea name="skills"></textarea>
</div>

<div class="form-group">
    <label>Portfolio</label>
    <input type="url" name="portfolio">
</div>

<div class="form-group">
    <label>Years</label>
    <input type="number" name="years">
</div>

<button class="btn">Submit</button>

</form>

</div>
</div>


<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chatbot">
<div class="chat-header">Assistant</div>
<div class="chat-body" id="chatBody">
<div class="bot-message">Ask me something!</div>
</div>

<div class="chat-footer">
<input id="userInput">
<button onclick="sendMessage()">Send</button>
</div>
</div>


<footer>
<p>© 2025 Hot Beans</p>
</footer>

<script>
function toggleChat() {
    const chat = document.querySelector(".chatbot");
    chat.style.display = chat.style.display === "block" ? "none" : "block";
}

function sendMessage() {
    let input = document.getElementById("userInput");
    let chat = document.getElementById("chatBody");

    chat.innerHTML += `<div class="user-message">${input.value}</div>`;
    chat.innerHTML += `<div class="bot-message">Thanks! I'll help you navigate.</div>`;

    input.value = "";
}
</script>

</body>
</html>
